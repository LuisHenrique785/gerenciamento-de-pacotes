<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Inventário</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <span class="eyebrow">Controle de estoque</span>
        <h1>Sistema de Inventário</h1>
      </div>

      <div class="toolbar" aria-label="Ações de dados">
        <button class="btn btn-secondary" id="btnExport" type="button" title="Exportar dados">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          <span>Exportar</span>
        </button>
        <label class="btn btn-secondary import-button" title="Importar dados">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V10m0 0 4 4m-4-4-4 4M4 7V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/></svg>
          <span>Importar</span>
          <input id="fileImport" type="file" accept="application/json">
        </label>
      </div>
    </header>

    <section class="metrics" aria-label="Resumo do inventário">
      <article class="metric">
        <span>SKUs</span>
        <strong id="metricItems">0</strong>
      </article>
      <article class="metric">
        <span>Unidades</span>
        <strong id="metricUnits">0</strong>
      </article>
      <article class="metric metric-warning">
        <span>Estoque baixo</span>
        <strong id="metricLow">0</strong>
      </article>
      <article class="metric metric-value">
        <span>Valor estimado</span>
        <strong id="metricValue">R$ 0,00</strong>
      </article>
    </section>

    <main class="inventory-layout">
      <section class="panel form-panel" aria-labelledby="formTitle">
        <div class="panel-heading">
          <h2 id="formTitle">Novo item</h2>
          <button class="icon-btn ghost" id="btnClear" type="button" title="Limpar formulário" aria-label="Limpar formulário">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V5h6v2m-8 0 1 14h8l1-14"/></svg>
          </button>
        </div>

        <form id="itemForm" autocomplete="off">
          <input id="itemId" type="hidden">

          <div class="field">
            <label for="name">Item</label>
            <input id="name" name="name" type="text" maxlength="80" required>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="sku">SKU</label>
              <input id="sku" name="sku" type="text" maxlength="32" required>
            </div>
            <div class="field">
              <label for="category">Categoria</label>
              <input id="category" name="category" type="text" maxlength="40" list="categoryOptions" required>
              <datalist id="categoryOptions"></datalist>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="quantity">Quantidade</label>
              <input id="quantity" name="quantity" type="number" min="0" step="1" required>
            </div>
            <div class="field">
              <label for="minimum">Mínimo</label>
              <input id="minimum" name="minimum" type="number" min="0" step="1" required>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="cost">Custo unitário</label>
              <input id="cost" name="cost" type="number" min="0" step="0.01" required>
            </div>
            <div class="field">
              <label for="location">Local</label>
              <input id="location" name="location" type="text" maxlength="40">
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-secondary" id="btnCancelEdit" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
              <span>Cancelar</span>
            </button>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
              <span id="submitLabel">Salvar item</span>
            </button>
          </div>
        </form>
      </section>

      <section class="panel table-panel" aria-labelledby="listTitle">
        <div class="list-heading">
          <div>
            <h2 id="listTitle">Itens em estoque</h2>
            <span id="resultCount">0 itens</span>
          </div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/></svg>
            <input id="searchInput" type="search" placeholder="Buscar item, SKU, categoria ou local">
          </div>
        </div>

        <div class="filters">
          <select id="categoryFilter" aria-label="Filtrar por categoria">
            <option value="all">Todas as categorias</option>
          </select>
          <select id="sortSelect" aria-label="Ordenar itens">
            <option value="name">Nome</option>
            <option value="quantityAsc">Menor estoque</option>
            <option value="quantityDesc">Maior estoque</option>
            <option value="valueDesc">Maior valor</option>
          </select>
          <div class="segmented" role="group" aria-label="Filtrar por status de estoque">
            <button class="active" type="button" data-stock-filter="all">Todos</button>
            <button type="button" data-stock-filter="low">Baixo</button>
            <button type="button" data-stock-filter="ok">OK</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Item</th>
                <th>Categoria</th>
                <th>Estoque</th>
                <th>Valor</th>
                <th class="actions-col">Ações</th>
              </tr>
            </thead>
            <tbody id="inventoryRows"></tbody>
          </table>
          <div class="empty-state" id="emptyState" hidden>
            Nenhum item encontrado.
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="inventory.js"></script>
</body>
</html>
